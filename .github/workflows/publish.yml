name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with: { node-version: 22.x, cache: "npm" }
      # Creates the GitHub Pages site with the "GitHub Actions" source if it
      # does not exist yet, so forks deploy without touching repo settings
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - run: npm run build
        env:
          # Default to /<repo name>/ so forks deploy without configuring the
          # REPO_BASE variable; set the variable to override (e.g. for a
          # custom domain, use "/")
          REPO_BASE: ${{ vars.REPO_BASE || format('/{0}/', github.event.repository.name) }}
      - uses: actions/upload-pages-artifact@v3
        with: { path: ./dist }
      - uses: actions/deploy-pages@v4

    permissions:
      id-token: write
      pages: write
      contents: read
