name: Update energy data

# Refreshes src/generated/energyData.ts from the open APIs of SSB (and
# friends) and commits the result to the branch the workflow was run on.
# GitHub-hosted runners have open internet access, so this doubles as
# verification that the data sources are reachable and parse correctly.
on:
  workflow_dispatch:
  schedule:
    # First day of every month at 06:00 UTC — keeps the figures fresh
    - cron: "0 6 1 * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with: { node-version: 22.x, cache: "npm" }
      - run: npm ci
      - run: npm run data:energy
      - run: npm test
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/generated/energyData.ts
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update energy data from SSB open APIs"
            git push
          fi
